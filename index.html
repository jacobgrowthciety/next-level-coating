<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Brand fonts (reference/BRIEF.md §2): Anton = bold condensed display, Permanent Marker =
         brush/marker script, Plus Jakarta Sans = site-wide body/paragraph font (weights 400/500/600
         cover font-normal, font-medium, font-semibold usage across the site) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- No static <title> or <meta name="description"> here on purpose — every route sets its
         own via react-helmet-async (see src/components/Seo.tsx). react-helmet-async only
         manages tags it creates itself; it does not adopt/replace a pre-existing static tag,
         it inserts its own alongside it. A static tag here would produce two <title>/<meta
         description> elements per page (confirmed — this is what was happening before this
         comment was added), with crawlers/validators liable to read whichever one comes first
         in the DOM instead of the real per-page one. Modern crawlers execute JS before
         indexing, so the brief pre-hydration gap (blank tab title until React mounts) is an
         accepted tradeoff for this client-only SPA. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
