<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Brand fonts (reference/BRIEF.md §2): Anton = bold condensed display, Permanent Marker =
         brush/marker script, Plus Jakarta Sans = site-wide body/paragraph font (weights 400/500/600
         cover font-normal, font-medium, font-semibold usage across the site) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Fallback title only — every route sets its own <title>/<meta name="description"> via
         react-helmet-async (see src/components/Seo.tsx), which replaces this on mount. There's
         deliberately no static meta description here: react-helmet-async only manages tags it
         creates itself, so a static one here would sit alongside (not get replaced by) each
         route's real description instead of being overridden, and crawlers pick whichever
         description tag comes first in the DOM — i.e. this stale one, not the per-page one. -->
    <title>Next Level Coatings | Arizona Concrete Coating Experts</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
